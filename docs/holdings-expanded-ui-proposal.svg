<svg xmlns="http://www.w3.org/2000/svg" width="860" height="980" viewBox="0 0 860 980">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.24"/>
    </filter>
    <style>
      .bg{fill:#201f1a}
      .panel{fill:#101211;stroke:#203b33;stroke-width:1.3}
      .row{fill:#121412;stroke:#30302b;stroke-width:1}
      .detail{fill:#171914;stroke:#244139;stroke-width:1.2}
      .tile{fill:#24231e}
      .ink{fill:#f7fbff;font-family:Arial,'Microsoft JhengHei',sans-serif}
      .muted{fill:#8d9996;font-family:Arial,'Microsoft JhengHei',sans-serif}
      .mint{fill:#63c0a8;font-family:Arial,'Microsoft JhengHei',sans-serif}
      .red{fill:#eb7367;font-family:Arial,'Microsoft JhengHei',sans-serif}
      .gold{fill:#d4a748;font-family:Arial,'Microsoft JhengHei',sans-serif}
      .small{font-size:18px}
      .xs{font-size:15px}
      .md{font-size:24px;font-weight:700}
      .lg{font-size:32px;font-weight:800}
    </style>
  </defs>

  <rect width="860" height="980" class="bg"/>
  <text x="72" y="66" class="mint small" font-weight="700">Stock Ledger</text>
  <text x="72" y="102" class="ink md">持股</text>

  <rect x="72" y="138" width="716" height="774" rx="22" class="panel" filter="url(#shadow)"/>
  <text x="104" y="188" class="ink md">持股 21 檔</text>
  <rect x="632" y="158" width="116" height="46" rx="14" fill="#24231e"/>
  <text x="668" y="188" class="mint small" font-weight="700">清單</text>

  <text x="104" y="238" class="muted xs">目前問題：展開後又出現一次股票名稱，資訊重複。</text>
  <text x="104" y="266" class="mint xs" font-weight="700">建議：股票名稱只留在清單列；展開區只放數據、進階、操作。</text>

  <!-- Collapsed row -->
  <rect x="104" y="306" width="652" height="96" rx="16" class="row"/>
  <text x="132" y="346" class="ink md">006208 富邦台50</text>
  <text x="132" y="374" class="muted xs">1160 股 · ETF</text>
  <text x="710" y="346" text-anchor="end" class="ink md">$279,850</text>
  <text x="710" y="374" text-anchor="end" class="red xs">94.27%</text>
  <text x="736" y="348" class="muted xs">⌄</text>

  <!-- Expanded row -->
  <rect x="104" y="426" width="652" height="392" rx="16" class="row"/>
  <text x="132" y="466" class="ink md">006208 富邦台50</text>
  <text x="132" y="494" class="muted xs">1160 股 · ETF</text>
  <text x="710" y="466" text-anchor="end" class="ink md">$279,850</text>
  <text x="710" y="494" text-anchor="end" class="red xs">94.27%</text>
  <text x="736" y="468" class="muted xs">⌃</text>

  <rect x="132" y="524" width="596" height="254" rx="16" class="detail"/>
  <text x="156" y="558" class="muted xs">展開明細不再重複股票名稱</text>
  <rect x="156" y="584" width="548" height="74" rx="14" class="tile"/>
  <text x="180" y="616" class="muted xs">持有成本(含手續費)</text>
  <text x="180" y="646" class="ink md">$144,025</text>
  <text x="680" y="616" text-anchor="end" class="muted xs">預估損益</text>
  <text x="680" y="646" text-anchor="end" class="red md">$135,825</text>

  <rect x="156" y="674" width="170" height="74" rx="14" class="tile"/>
  <text x="180" y="706" class="muted xs">每股均價</text>
  <text x="180" y="736" class="ink md">124.2</text>
  <rect x="342" y="674" width="170" height="74" rx="14" class="tile"/>
  <text x="366" y="706" class="muted xs">現價</text>
  <text x="366" y="736" class="ink md">241.3</text>
  <rect x="528" y="674" width="176" height="74" rx="14" class="tile"/>
  <text x="552" y="706" class="muted xs">報酬率</text>
  <text x="552" y="736" class="red md">94.27%</text>

  <rect x="156" y="804" width="184" height="48" rx="14" fill="#17382f"/>
  <text x="214" y="835" class="mint small" font-weight="700">調整</text>
  <rect x="356" y="804" width="348" height="48" rx="14" fill="#24231e"/>
  <text x="392" y="835" class="muted small">進階：帳面損益、賣出成本</text>
</svg>
