<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1280" viewBox="0 0 860 1280">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.24"/>
    </filter>
    <style>
      .bg{fill:#201f1a}
      .panel{fill:#101211;stroke:#203b33;stroke-width:1.5}
